<script>
  var upClass = 'toggle-up';
  var downClass = 'toggle-down';

  function toggle() {
    var square = document.querySelector('.square');

    if (~square.className.indexOf(downClass)) {
      square.className = square.className.replace(downClass, upClass);
    } else {
      square.className = square.className.replace(upClass, downClass);
    }
  }

<script>
function runPanelScripts(panel, scripts) {
  return scripts.reduce(function (promise, oldScript) {
    return promise.then(function () {
      return new Promise(function (resolve, reject) {
        const newScript = document.createElement('script');
        Array.from(oldScript.attributes).forEach(function (attr) {
          newScript.setAttribute(attr.name, attr.value);
        });
        newScript.textContent = oldScript.textContent;

        if (newScript.src) {
          newScript.onload = resolve;
          newScript.onerror = reject;
        }

        panel.appendChild(newScript);

        if (!newScript.src) {
          resolve();
        }
      });
    });
  }, Promise.resolve());
}

function mountPanel(htmlFile, data) {
  const content = document.getElementById('content');
  const panel = document.createElement('div');
  panel.className = 'content-panel';
  panel.dataset.page = htmlFile;

  const doc = new DOMParser().parseFromString(data, 'text/html');
  const scripts = [...doc.querySelectorAll('script')];

  scripts.forEach(script => script.remove());
  panel.innerHTML = doc.body.innerHTML;
  content.appendChild(panel);

  return runPanelScripts(panel, scripts).then(function () {
    return panel;
  });
}

function showPanel(htmlFile) {
  const content = document.getElementById('content');
  content.querySelectorAll('.content-panel').forEach(panel => {
    panel.hidden = panel.dataset.page !== htmlFile;
  });
  window.scrollTo(0, 0);
}

function loadContent(htmlFile) {
  const content = document.getElementById('content');
  const existingPanel = content.querySelector('.content-panel[data-page="' + htmlFile + '"]');

  if (existingPanel) {
    showPanel(htmlFile);
    return;
  }

  fetch(htmlFile)
    .then(response => response.text())
    .then(data => {
      if (content.querySelector('.content-panel[data-page="' + htmlFile + '"]')) {
        showPanel(htmlFile);
        return;
      }

      mountPanel(htmlFile, data).then(function () {
        showPanel(htmlFile);
      });
    })
    .catch(error => console.error(error));
}

function loadHome() {
  loadContent('iFeya.html');
}


window.onload = function() {
  loadContent('iFeya.html');}
